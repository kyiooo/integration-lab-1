<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mój Blog</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fff5f7; } 
        .navbar-custom { background-color: #ffdae9; } 
        .card { border: none; border-radius: 15px; }
        .card-title { color: #efa7cb; } 
        .btn-pastel { 
            background-color: #ffdae9; 
            color: #efa7cb; 
            border: 1px solid #ffb6c1; 
        }
        .btn-pastel:hover { background-color: #ffb6c1; }
    </style>
</head>
<body>

    <nav class="navbar navbar-custom shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand text-dark fw-bold" href="/">🌸 Mój Blog</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="mb-4 text-center" style="color: #000000;">🌸 Najnowsze wpisy 🌸</h1>
                
                {% for post in postList %}
                    <div class="card shadow-sm mb-4">
                        <div class="card-body">
                            <h2 class="card-title h4">{{ post.title }}</h2>
                            <h6 class="card-subtitle mb-2 text-muted">Autor: {{ post.author }}</h6>
                            <p class="card-text">{{ post.content|truncatewords:20 }}</p>
                            <a href="{% url 'postDetail' post.pk %}" class="btn btn-pastel btn-sm">Czytaj więcej...</a>
                        </div>
                    </div>
                {% empty %}
                    <div class="alert alert-light">Brak wpisów. Zajrzyj do admina!</div>
                {% endfor %}
            </div>
        </div>
    </div>

</body>
</html>
