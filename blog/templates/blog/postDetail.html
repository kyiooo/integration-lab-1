<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{{ postDetail.title }}</title>
    <style>
        body { background-color: #fff5f7; }
        .navbar-custom { background-color: #ffdae9; }
        .article-container { background-color: white; border-radius: 20px; padding: 40px; }
        h1 { color: #efa7cb; }
    </style>
</head>
<body>

    <nav class="navbar navbar-custom shadow-sm mb-5">
        <div class="container">
            <a class="navbar-brand text-dark fw-bold" href="/">🌸 Mój Zwierzakowy Blog</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="article-container shadow-sm">
                    <h1 class="display-5 fw-bold">{{ postDetail.title }}</h1>
                    <p class="text-muted border-bottom pb-3">
                        Przez: <strong>{{ postDetail.author }}</strong> | {{ postDetail.published_at|date:"d.m.Y" }}
                    </p>
                    <div class="mt-4 lead" style="color: #444;">
                        {{ postDetail.content|linebreaks }}
                    </div>
                    <hr class="mt-5">
                    <a href="{% url 'postList' %}" class="btn btn-outline-secondary">← Wróć</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
